<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- RatAttacK placeholder pixel-art rat sigil.
       Replace this file with the final logo SVG when ready — no code changes required.
       32x32 grid, crimson palette matching SITE_CONFIG.theme.primary. -->
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#dc2626" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded dark background -->
  <rect width="32" height="32" rx="6" ry="6" fill="#0a0a0a"/>
  <rect x="1" y="1" width="30" height="30" rx="5" ry="5" fill="url(#halo)"/>

  <!-- Ears -->
  <rect x="6"  y="5" width="4" height="4" fill="#7f1d1d"/>
  <rect x="22" y="5" width="4" height="4" fill="#7f1d1d"/>
  <rect x="7"  y="6" width="2" height="2" fill="#dc2626"/>
  <rect x="23" y="6" width="2" height="2" fill="#dc2626"/>

  <!-- Head (rounded via multiple rects) -->
  <rect x="7"  y="9"  width="18" height="14" fill="#a1a1aa"/>
  <rect x="6"  y="11" width="20" height="10" fill="#a1a1aa"/>
  <rect x="8"  y="8"  width="16" height="1"  fill="#71717a"/>

  <!-- Head shading -->
  <rect x="8"  y="10" width="16" height="2" fill="#d4d4d8" opacity="0.4"/>

  <!-- Eyes -->
  <rect x="10" y="13" width="3" height="3" fill="#0a0a0a"/>
  <rect x="19" y="13" width="3" height="3" fill="#0a0a0a"/>
  <rect x="11" y="14" width="1" height="1" fill="#dc2626"/>
  <rect x="20" y="14" width="1" height="1" fill="#dc2626"/>

  <!-- Nose -->
  <rect x="15" y="18" width="2" height="2" fill="#dc2626"/>

  <!-- Whiskers -->
  <rect x="3"  y="18" width="3" height="1" fill="#71717a"/>
  <rect x="3"  y="20" width="3" height="1" fill="#71717a"/>
  <rect x="26" y="18" width="3" height="1" fill="#71717a"/>
  <rect x="26" y="20" width="3" height="1" fill="#71717a"/>

  <!-- Teeth -->
  <rect x="14" y="20" width="1" height="2" fill="#f5f5f4"/>
  <rect x="17" y="20" width="1" height="2" fill="#f5f5f4"/>

  <!-- Bottom accent border -->
  <rect x="6"  y="23" width="20" height="1" fill="#7f1d1d" opacity="0.6"/>
</svg>
